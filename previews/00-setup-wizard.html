<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정 마법사 — AD Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-page-bg: #0d1117;
      --color-card-bg: #161b22;
      --color-surface: #1c2128;
      --color-input-bg: #0d1117;
      --color-hover: #21262d;
      --color-border: #30363d;
      --color-border-subtle: #21262d;
      --color-text-primary: #e6edf3;
      --color-text-secondary: #8b949e;
      --color-text-muted: #484f58;
      --color-accent-blue: #3b82f6;
      --color-accent-blue-hover: #2563eb;
      --color-accent-green: #10b981;
      --color-accent-yellow: #f59e0b;
      --color-accent-red: #ef4444;
      --color-accent-purple: #7c3aed;

      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-text-primary);
      background-color: var(--color-page-bg);
      background-image: radial-gradient(ellipse at top, rgba(59, 130, 246, 0.04), transparent 60%);
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wizard {
      width: 100%;
      max-width: 560px;
      padding: 0 24px;
    }

    /* ---------- Step Indicator ---------- */
    .step-indicator {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      margin-top: 60px;
      margin-bottom: 32px;
      gap: 0;
      width: 100%;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .step-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .step-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-text-muted);
      border: 2px solid var(--color-page-bg);
      box-shadow: 0 0 0 2px var(--color-text-muted);
      transition: all 0.25s ease;
    }

    .step-dot.active {
      background: var(--color-accent-blue);
      box-shadow: 0 0 0 2px var(--color-accent-blue), 0 0 12px rgba(59, 130, 246, 0.4);
    }

    .step-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-muted);
      white-space: nowrap;
      transition: color 0.25s ease;
    }

    .step-label.active {
      color: var(--color-text-primary);
    }

    .step-line {
      flex: 1;
      height: 2px;
      background: var(--color-border);
      margin-top: 6px;
      min-width: 40px;
    }

    /* ---------- Card ---------- */
    .card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 32px;
    }

    /* ---------- Logo ---------- */
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--color-accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pulse 2s infinite;
    }

    .logo svg {
      color: #fff;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.45);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(59, 130, 246, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    /* ---------- Heading ---------- */
    .heading {
      text-align: center;
      margin-bottom: 28px;
    }

    .heading h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .heading p {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    /* ---------- Form ---------- */
    .form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-secondary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      background: rgba(59, 130, 246, 0.12);
      color: var(--color-accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .badge svg {
      width: 12px;
      height: 12px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input {
      width: 100%;
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--color-text-primary);
      font-size: 14px;
      font-family: var(--font-mono);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      outline: none;
    }

    .input::placeholder {
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    .input:hover {
      border-color: var(--color-text-muted);
    }

    .input:focus {
      border-color: var(--color-accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input.error {
      border-color: var(--color-accent-red);
    }

    .input.error:focus {
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .input.success {
      border-color: var(--color-accent-green);
    }

    .input.success:focus {
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    .input-icon-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .input-icon-btn:hover {
      color: var(--color-text-primary);
      background: var(--color-hover);
    }

    .input-icon-status {
      position: absolute;
      right: 12px;
      display: flex;
      align-items: center;
      color: var(--color-accent-green);
      pointer-events: none;
    }

    .helper {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .helper.error {
      color: var(--color-accent-red);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .helper.success {
      color: var(--color-accent-green);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .helper svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* ---------- Password Strength ---------- */
    .strength {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .strength-bars {
      display: flex;
      gap: 4px;
    }

    .strength-bar {
      height: 3px;
      flex: 1;
      background: var(--color-border-subtle);
      border-radius: 2px;
      transition: background 0.2s ease;
    }

    .strength-bar.s1 { background: var(--color-accent-red); }
    .strength-bar.s2 { background: var(--color-accent-yellow); }
    .strength-bar.s3 { background: var(--color-accent-yellow); }
    .strength-bar.s4 { background: var(--color-accent-green); }

    .strength-label {
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .strength-label.strong { color: var(--color-accent-green); }
    .strength-label.fair { color: var(--color-accent-yellow); }
    .strength-label.weak { color: var(--color-accent-red); }

    /* ---------- Warning Box ---------- */
    .warning-box {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-top: 4px;
    }

    .warning-box svg {
      color: var(--color-accent-yellow);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .warning-box p {
      font-size: 13px;
      color: var(--color-accent-yellow);
      line-height: 1.5;
    }

    /* ---------- Buttons ---------- */
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.05s ease;
      white-space: nowrap;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-outline {
      background: transparent;
      border-color: var(--color-border);
      color: var(--color-text-secondary);
    }

    .btn-outline:hover {
      background: var(--color-hover);
      border-color: var(--color-text-muted);
      color: var(--color-text-primary);
    }

    .btn-primary {
      background: var(--color-accent-blue);
      color: #fff;
      border-color: var(--color-accent-blue);
    }

    .btn-primary:hover {
      background: var(--color-accent-blue-hover);
      border-color: var(--color-accent-blue-hover);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* ---------- Footer ---------- */
    .footer {
      text-align: center;
      margin-top: 24px;
      padding-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .footer-version {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .footer a {
      font-size: 12px;
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: color 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer a:hover {
      color: var(--color-text-primary);
    }

    .footer a svg {
      width: 12px;
      height: 12px;
    }
  </style>
</head>
<body>
  <div class="wizard">
    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="step-node">
        <div class="step-dot active"></div>
        <span class="step-label active">도메인 설정</span>
      </div>
      <div class="step-line"></div>
      <div class="step-node">
        <div class="step-dot"></div>
        <span class="step-label">확인</span>
      </div>
      <div class="step-line"></div>
      <div class="step-node">
        <div class="step-dot"></div>
        <span class="step-label">프로비저닝</span>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <!-- Logo -->
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>

      <!-- Heading -->
      <div class="heading">
        <h1>도메인 설정</h1>
        <p>Samba 4 Active Directory 도메인을 구성합니다</p>
      </div>

      <!-- Form -->
      <form class="form" onsubmit="event.preventDefault()">
        <!-- Domain FQDN -->
        <div class="field">
          <label class="field-label" for="fqdn">도메인 FQDN</label>
          <div class="input-wrap">
            <input class="input" type="text" id="fqdn" value="CORP.LOCAL" placeholder="CORP.LOCAL" autocomplete="off">
          </div>
          <span class="helper">대문자 권장 (예: CORP.LOCAL)</span>
        </div>

        <!-- NetBIOS Name -->
        <div class="field">
          <label class="field-label" for="netbios">
            NetBIOS 이름
            <span class="badge">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
              </svg>
              자동 생성
            </span>
          </label>
          <div class="input-wrap">
            <input class="input" type="text" id="netbios" value="CORP" placeholder="CORP" maxlength="15" autocomplete="off">
          </div>
          <span class="helper">최대 15자, 도메인 가입 시 Windows PC에 표시됩니다</span>
        </div>

        <!-- Administrator Password -->
        <div class="field">
          <label class="field-label" for="password">관리자 비밀번호</label>
          <div class="input-wrap">
            <input class="input" type="password" id="password" value="S3cur3P@ss2024" placeholder="••••••••" autocomplete="new-password">
            <button class="input-icon-btn" type="button" onclick="togglePassword('password', this)" aria-label="비밀번호 표시">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="strength">
            <div class="strength-bars">
              <div class="strength-bar s1"></div>
              <div class="strength-bar s2"></div>
              <div class="strength-bar s3"></div>
              <div class="strength-bar s4"></div>
            </div>
            <span class="strength-label strong">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              강함
            </span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <label class="field-label" for="confirm">비밀번호 확인</label>
          <div class="input-wrap">
            <input class="input success" type="password" id="confirm" value="S3cur3P@ss2024" placeholder="••••••••" autocomplete="new-password">
            <span class="input-icon-status">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
          </div>
          <span class="helper success">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            비밀번호 일치
          </span>
        </div>

        <!-- DNS Forwarder -->
        <div class="field">
          <label class="field-label" for="dns">DNS 포워더</label>
          <div class="input-wrap">
            <input class="input" type="text" id="dns" value="8.8.8.8" placeholder="8.8.8.8" autocomplete="off">
          </div>
          <span class="helper">외부 도메인 해석을 위한 DNS 서버</span>
        </div>

        <!-- Warning Box -->
        <div class="warning-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <p>이 서버가 주 도메인 컨트롤러로 구성됩니다. 기존 AD 도메인이 있는 경우 충돌이 발생할 수 있습니다.</p>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-outline" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            취소
          </button>
          <button class="btn btn-primary" type="button">
            다음
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-version">Samba 4 AD Manager v0.1.0</span>
      <a href="#">
        문서 보기
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
      </a>
    </div>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        btn.setAttribute('aria-label', '비밀번호 숨기기');
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        btn.setAttribute('aria-label', '비밀번호 표시');
      }
    }
  </script>
</body>
</html>
