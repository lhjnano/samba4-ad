<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도메인 조인 현황 — AD Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-root:#0d1117;--bg-card:#161b22;--bg-sidebar:#1c2128;--bg-input:#0d1117;--bg-hover:#21262d;--bg-active:#1f3244;--border:#30363d;--border-subtle:#21262d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--accent-blue:#3b82f6;--accent-green:#10b981;--accent-yellow:#f59e0b;--accent-red:#ef4444;--accent-purple:#7c3aed;--radius-sm:6px;--radius-md:8px;--radius-lg:12px}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;color:var(--text-primary);background:var(--bg-root)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:grid;grid-template-areas:"topbar topbar" "sidebar main";grid-template-rows:56px 1fr;grid-template-columns:220px 1fr;height:100vh}
.topbar{grid-area:topbar;display:flex;align-items:center;gap:16px;padding:0 16px;background:var(--bg-card);border-bottom:1px solid var(--border);z-index:100}
.logo-icon{width:28px;height:28px;background:var(--accent-blue);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}.logo-icon svg{width:16px;height:16px;color:#fff}
.logo-text{font-size:13px;font-weight:700}
.domain-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:20px}
.domain-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.domain-name{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent-green)}
.search-wrap{flex:1;display:flex;align-items:center;max-width:380px;margin:0 auto;position:relative}.search-wrap svg{position:absolute;left:10px;width:14px;height:14px;color:var(--text-muted)}
.search-input{width:100%;padding:6px 10px 6px 32px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;outline:none}.search-input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.notif-btn{position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer}.notif-btn svg{width:18px;height:18px}
.notif-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--accent-red);border-radius:8px;font-size:10px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg-card)}
.profile{display:flex;align-items:center;gap:8px;cursor:pointer}.profile-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent-blue),#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}.profile-name{font-size:13px}
.sidebar{grid-area:sidebar;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-section{padding:16px 0 4px}.sidebar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:0 16px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--text-secondary);cursor:pointer;position:relative;transition:.15s;text-decoration:none}.nav-item svg{width:16px;height:16px;flex-shrink:0}.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--bg-active);color:var(--accent-blue);font-weight:500}.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent-blue);border-radius:0 3px 3px 0}
.sidebar-spacer{flex:1}
.main{grid-area:main;overflow-y:auto;padding:20px 24px}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:700;letter-spacing:-0.03em}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;border:none;text-decoration:none}.btn svg{width:14px;height:14px}
.btn-primary{background:var(--accent-blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}.btn-outline:hover{background:var(--bg-hover);color:var(--text-primary)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;position:relative;overflow:hidden}.stat-stripe{position:absolute;top:0;right:0;width:3px;height:100%}
.stat-label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);margin-bottom:10px}.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1}.stat-sub{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text-muted)}
.trend-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;font-family:'JetBrains Mono',monospace}
.trend-up{background:rgba(16,185,129,0.12);color:var(--accent-green)}.trend-down{background:rgba(239,68,68,0.12);color:var(--accent-red)}
.os-breakdown{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-title{font-size:14px;font-weight:600;margin-bottom:16px}
.os-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}.os-bar-row:last-child{margin-bottom:0}
.os-label{width:100px;font-size:12.5px;font-weight:500;flex-shrink:0;display:flex;align-items:center;gap:6px}
.os-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.os-bar-wrap{flex:1;height:22px;background:var(--bg-input);border-radius:4px;overflow:hidden}
.os-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.os-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);width:60px;text-align:right;flex-shrink:0}
.join-trend{display:flex;align-items:flex-end;gap:10px;height:120px}
.join-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end}
.join-bar-fill{width:100%;max-width:28px;background:linear-gradient(180deg,var(--accent-blue),rgba(59,130,246,0.4));border-radius:3px 3px 0 0;min-height:4px;transition:.3s}
.join-bar-label{font-size:10px;color:var(--text-muted)}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-search{flex:1;min-width:200px;max-width:320px;position:relative}.filter-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-muted)}
.filter-search input{width:100%;padding:7px 10px 7px 32px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;outline:none}.filter-search input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.custom-select{position:relative}.custom-select select{appearance:none;padding:7px 32px 7px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;cursor:pointer;outline:none;font-family:inherit}
.custom-select::after{content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--text-secondary);pointer-events:none}
.toggle-group{display:flex;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.toggle-btn{padding:6px 14px;font-size:12.5px;color:var(--text-secondary);cursor:pointer;transition:.15s;border:none;background:transparent;font-family:inherit}.toggle-btn.active{background:var(--accent-blue);color:#fff}.toggle-btn:hover:not(.active){background:var(--bg-hover);color:var(--text-primary)}
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:10px 14px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);background:var(--bg-sidebar);border-bottom:1px solid var(--border);white-space:nowrap}
thead th:first-child{width:36px}
tbody tr{border-bottom:1px solid var(--border-subtle);transition:.15s;cursor:pointer}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:var(--bg-hover)}
td{padding:10px 14px;font-size:13px;white-space:nowrap}
.hostname{font-family:'JetBrains Mono',monospace;color:var(--accent-blue);font-weight:500}
.os-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.os-win11{background:rgba(59,130,246,0.12);color:var(--accent-blue)}.os-win10{background:rgba(16,185,129,0.12);color:var(--accent-green)}.os-linux{background:rgba(245,158,11,0.12);color:var(--accent-yellow)}.os-winserver{background:rgba(124,58,237,0.12);color:var(--accent-purple)}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.status-active{background:rgba(16,185,129,0.12);color:var(--accent-green)}.status-inactive{background:rgba(139,148,158,0.12);color:var(--text-secondary)}.status-stale{background:rgba(239,68,68,0.12);color:var(--accent-red)}
.ip-addr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary)}
.last-seen{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-muted)}
.row-actions{display:flex;gap:4px}
.action-btn{padding:4px 8px;font-size:11.5px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);cursor:pointer;transition:.15s}.action-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border-subtle)}
.page-info{font-size:12px;color:var(--text-muted)}
.page-numbers{display:flex;align-items:center;gap:4px}
.page-btn{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);cursor:pointer;transition:.15s}.page-btn:hover{background:var(--bg-hover)}.page-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff}.page-btn:disabled{opacity:.4;cursor:default}
@media(max-width:1200px){.stats-row{grid-template-columns:repeat(2,1fr)}.os-breakdown{grid-template-columns:1fr}}
@media(max-width:900px){.app{grid-template-columns:56px 1fr}.sidebar-label,.nav-item span{display:none}.nav-item{justify-content:center}.domain-pill .domain-name,.profile-name{display:none}}
</style>
</head>

<script>
const osData=[
{name:'Windows 11',count:156,color:'#3b82f6'},
{name:'Windows 10',count:98,color:'#10b981'},
{name:'Linux (Ubuntu)',count:45,color:'#f59e0b'},
{name:'Windows Server 2022',count:28,color:'#7c3aed'},
{name:'기타',count:15,color:'#8b949e'}

const maxOS=Math.max(...osData.map(d=>d.count));
const osEl=document.getElementById('osDist');
osData.forEach(d=>{const pct=d.count/maxOS*100;const r=document.createElement('div');r.className='os-bar-row';r.innerHTML=`<span class="os-label"><span class="os-dot" style="background:${d.color}"></span>${d.name}</span><div class="os-bar-wrap"><div class="os-bar-fill" style="width:0%;background:${d.color}"></div></div><span class="os-count">${d.count}대</span>`;osEl.appendChild(r);setTimeout(()=>r.querySelector('.os-bar-fill').style.width=pct+'%',100)});

const joinTrend=[{day:'월',count:3},{day:'화',count:1},{day:'수',count:0},{day:'목',count:2},{day:'금',count:5},{day:'토',count:0},{day:'일',count:2}];
const maxJT=Math.max(...joinTrend.map(d=>d.count),1);
const jtEl=document.getElementById('joinTrend');
joinTrend.forEach(d=>{const h=d.count/maxJT*100;const b=document.createElement('div');b.className='join-bar';b.innerHTML=`<div class="join-bar-fill" style="height:0%"></div><span class="join-bar-label">${d.day}</span>`;jtEl.appendChild(b);setTimeout(()=>b.querySelector('.join-bar-fill').style.height=Math.max(h,5)+'%',100)});
